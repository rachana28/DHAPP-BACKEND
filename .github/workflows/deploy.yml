name: Universal Deploy

on:
  push:
    branches: [ "main", "DHAPP-BACKEND-STAGE" ]

jobs:
  # -----------------------------------------------------------------
  # JOB 1: QUALITY ASSURANCE
  # -----------------------------------------------------------------
  quality-check:
    name: 🛡️ Test Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run Syntax Check
        run: python -m compileall .

  # -----------------------------------------------------------------
  # JOB 2: BUILD & PUSH DOCKER IMAGE
  # -----------------------------------------------------------------
  build-docker:
    name: 🐳 Build & Push Docker
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Builds and pushes 'latest' tag when pushed to main branch
      - name: Build and push (Main/Production)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/dhapp-backend:latest

      # Builds and pushes 'stage' tag when pushed to stage branch
      - name: Build and push (Stage)
        if: github.ref == 'refs/heads/DHAPP-BACKEND-STAGE'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/dhapp-backend:stage

  # -----------------------------------------------------------------
  # JOB 3: RENDER DEPLOY
  # -----------------------------------------------------------------
  deploy-render:
    name: 🚀 Render Deploy
    needs: build-docker # Waits for the Docker image to be pushed first!
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy (Main)
        if: github.ref == 'refs/heads/main' && secrets.RENDER_DEPLOY_HOOK != ''
        # Using -X POST is standard practice for triggering webhooks
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Trigger Render Deploy (Stage)
        if: github.ref == 'refs/heads/DHAPP-BACKEND-STAGE' && secrets.RENDER_DEPLOY_HOOK_STG != ''
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STG }}"

  # -----------------------------------------------------------------
  # JOB 4: AWS DEPLOY
  # -----------------------------------------------------------------
  deploy-aws:
    name: 🔶 AWS Deploy
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Check for AWS Secrets
        id: check-aws
        run: |
          if [ "${{ secrets.AWS_ACCESS_KEY_ID }}" == "" ]; then
            echo "No AWS Secrets found. Skipping..."
            echo "has_aws=false" >> $GITHUB_OUTPUT
          else
            echo "has_aws=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Code
        if: steps.check-aws.outputs.has_aws == 'true'
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        if: steps.check-aws.outputs.has_aws == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        if: steps.check-aws.outputs.has_aws == 'true'
        uses: aws-actions/amazon-ecr-login@v2

  # -----------------------------------------------------------------
  # JOB 5: AZURE DEPLOY
  # -----------------------------------------------------------------
  deploy-azure:
    name: 🔷 Azure Deploy
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure Web App
        env:
          AZURE_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        if: env.AZURE_PROFILE != ''
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'your-app-name'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .